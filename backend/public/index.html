<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Place Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .search-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            padding: 3rem;
            max-width: 600px;
            width: 100%;
        }
        .search-icon {
            font-size: 4rem;
            color: #667eea;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="search-container">
            <div class="text-center">
                <i class="bi bi-search search-icon"></i>
                <h1 class="mb-4">Place Search</h1>
                <p class="text-muted mb-4">Search for places, businesses, and locations</p>
            </div>
            
            <form id="searchForm">
                <div class="mb-3">
                    <label for="searchQuery" class="form-label">Search Query</label>
                    <input 
                        type="text" 
                        class="form-control form-control-lg" 
                        id="searchQuery" 
                        placeholder="e.g., saloons in Chilw"
                        required
                    >
                </div>
                <div class="d-grid">
                    <button type="submit" class="btn btn-primary btn-lg">
                        <i class="bi bi-search me-2"></i>Search
                    </button>
                </div>
            </form>
            
            <div id="loadingSpinner" class="text-center mt-3" style="display: none;">
                <div class="spinner-border text-primary" role="status">
                    <span class="visually-hidden">Loading...</span>
                </div>
                <p class="mt-2 text-muted">Searching...</p>
            </div>
            
            <div id="errorAlert" class="alert alert-danger mt-3" style="display: none;" role="alert"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const searchForm = document.getElementById('searchForm');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const errorAlert = document.getElementById('errorAlert');

        searchForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const searchQuery = document.getElementById('searchQuery').value.trim();
            
            if (!searchQuery) {
                showError('Please enter a search query');
                return;
            }

            // Hide error, show loading
            errorAlert.style.display = 'none';
            loadingSpinner.style.display = 'block';
            searchForm.style.display = 'none';

            try {
                const response = await fetch('http://localhost:3000/api/search', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ q: searchQuery })
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Search failed');
                }

                const data = await response.json();
                
                // Store results in sessionStorage and redirect to results page
                sessionStorage.setItem('searchResults', JSON.stringify(data));
                sessionStorage.setItem('searchQuery', searchQuery);
                window.location.href = 'results.html';
                
            } catch (error) {
                console.error('Search error:', error);
                showError(error.message || 'An error occurred while searching. Please try again.');
                loadingSpinner.style.display = 'none';
                searchForm.style.display = 'block';
            }
        });

        function showError(message) {
            errorAlert.textContent = message;
            errorAlert.style.display = 'block';
        }
    </script>
</body>
</html>
